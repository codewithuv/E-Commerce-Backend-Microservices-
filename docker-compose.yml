version: "3.9"

# Local development stack: Kafka (KRaft, no ZooKeeper), one Postgres per
# service (database-per-service pattern), Redis for gateway rate limiting.
services:

  kafka:
    image: apache/kafka:3.7.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]

  orders-db:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_PASSWORD: CHANGE_ME     # PLACEHOLDER
    volumes: [orders-data:/var/lib/postgresql/data]

  inventory-db:
    image: postgres:16-alpine
    ports: ["5433:5432"]
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_PASSWORD: CHANGE_ME     # PLACEHOLDER
    volumes: [inventory-data:/var/lib/postgresql/data]

  payments-db:
    image: postgres:16-alpine
    ports: ["5434:5432"]
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_PASSWORD: CHANGE_ME     # PLACEHOLDER
    volumes: [payments-data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  discovery-server:
    build: ./discovery-server
    ports: ["8761:8761"]

  api-gateway:
    build: ./api-gateway
    ports: ["8080:8080"]
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka
      REDIS_HOST: redis
    depends_on: [discovery-server, redis]

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports: ["8081:8081"]
    environment:
      DB_HOST: orders-db
      DB_PASSWORD: CHANGE_ME           # PLACEHOLDER
      KAFKA_BOOTSTRAP: kafka:9092
      EUREKA_URI: http://discovery-server:8761/eureka
    depends_on:
      kafka: { condition: service_healthy }
      orders-db: { condition: service_started }
      discovery-server: { condition: service_started }

  inventory-service:
    build: ./inventory-service
    ports: ["8082:8082"]
    environment:
      DB_HOST: inventory-db
      DB_PASSWORD: CHANGE_ME           # PLACEHOLDER
      KAFKA_BOOTSTRAP: kafka:9092
      EUREKA_URI: http://discovery-server:8761/eureka
    depends_on:
      kafka: { condition: service_healthy }

  payment-service:
    build: ./payment-service
    ports: ["8083:8083"]
    environment:
      DB_HOST: payments-db
      DB_PASSWORD: CHANGE_ME           # PLACEHOLDER
      KAFKA_BOOTSTRAP: kafka:9092
      EUREKA_URI: http://discovery-server:8761/eureka
      PAYMENT_GATEWAY_API_KEY: PLACEHOLDER_API_KEY
    depends_on:
      kafka: { condition: service_healthy }

  notification-service:
    build: ./notification-service
    ports: ["8084:8084"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      EUREKA_URI: http://discovery-server:8761/eureka
    depends_on:
      kafka: { condition: service_healthy }

volumes:
  orders-data:
  inventory-data:
  payments-data:
